<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Generating Video</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black text-white flex items-center justify-center h-screen">

<div class="text-center w-[500px]">

<h1 class="text-4xl font-bold mb-8">
AI Generating Video
</h1>

<p id="status" class="mb-6 text-green-400">
Starting generation...
</p>

<div class="w-full bg-gray-700 rounded-full h-6 overflow-hidden">

<div
id="progressBar"
class="bg-green-500 h-6 rounded-full transition-all duration-500"
style="width:5%">
</div>

</div>

<p class="mt-6 text-gray-400 text-sm">
Please wait while AI generates your video
</p>

</div>

<script>

const API = "http://localhost:5000";

const jobId = localStorage.getItem("job_id");

if(!jobId){

    alert("No job found");
    window.location.href = "generate.html";

}

async function checkStatus(){

    try{

        const response =
        await fetch(API + "/api/status/" + jobId);

        const data = await response.json();

        const progressBar =
        document.getElementById("progressBar");

        const statusText =
        document.getElementById("status");

        if(progressBar){
            progressBar.style.width =
            data.progress + "%";
        }

        if(statusText){
            statusText.innerText =
            data.status;
        }

        // -------- INVALID INPUT --------
        if(data.status && data.status.includes("Invalid")){

            alert("Please enter a valid project title");

            localStorage.removeItem("job_id");

            window.location.href = "generate.html";

            return;

        }

        // -------- COMPLETE --------
        if(data.progress >= 100){

            localStorage.setItem(
                "video_url",
                API + data.video
            );

            localStorage.setItem(
                "doc_url",
                API + data.doc
            );

            window.location.href = "result.html";

            return;

        }

        setTimeout(checkStatus, 2000);

    }
    catch(error){

        console.error("Status error:", error);

        setTimeout(checkStatus, 3000);

    }

}

checkStatus();

</script>

</body>
</html>
